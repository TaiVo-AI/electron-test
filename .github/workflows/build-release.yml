name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Build exe
        run: npx electron-builder --win --publish never

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe